flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#ffffff"
    theme_color: "#E53935"
  image_path: "assets/images/logo.png"

  # Android specific
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.png"
  # Increase inset to prevent cropping (safe zone is typically 66dp, so 80 gives more padding)
  adaptive_icon_foreground_inset: 80

  # iOS specific
  # Add padding for iOS to prevent cropping on rounded corners
  ios_content_padding: 0.20

  # Windows specific
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 48

  # macOS specific
  macos:
    generate: true
    image_path: "assets/images/logo.png"
