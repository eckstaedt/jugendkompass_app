name: jugendkompass_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Supabase Integration
  supabase_flutter: ^2.5.6

  # Navigation
  go_router: ^14.2.0

  # UI Components
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  # Custom fonts via Google Fonts package (use latest version to avoid constant evaluation bug)
  google_fonts: ^8.0.2


  # Audio Playback
  just_audio: ^0.9.38
  audio_video_progress_bar: ^2.0.2

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Video Playback
  video_player: ^2.8.6
  chewie: ^1.8.1
  youtube_player_flutter: ^9.1.3
  flutter_inappwebview: ^6.1.5

  # HTTP & API
  http: ^1.2.1

  # Utilities
  intl: ^0.20.0
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  logger: ^2.3.0
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  flutter_html: ^3.0.0-beta.2
  flutter_localizations:
    sdk: flutter
  just_audio_background: ^0.0.1-beta.17
  home_widget: ^0.9.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0

  # App Icon Generator
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - dotenv
    - assets/images/
